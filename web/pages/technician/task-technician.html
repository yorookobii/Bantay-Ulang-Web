<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="css/dashboard-technician.css">
        <link rel="stylesheet" href="css/task-technician.css">
        <title>My Tasks - Bantay Ulang Bulacan</title>
    </head>
    <body>
        <div class="app">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="logo-row">
                        <div class="logo-droplets">
                            <img src="../../assets/img/logo-one.png" alt="Bantay Ulang" class="logo-img">
                        </div>
                        <span class="logo-text">Bantay Ulang</span>
                        <button type="button" class="sidebar-toggle" id="sidebarToggleBtn" aria-label="Collapse sidebar"><i class="fa-solid fa-chevron-left"></i></button>
                    </div>
                </div>
                <ul class="sidebar-menu">
                    <li><a href="dashboard-technician.html" title="Dashboard"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
                    <li><a href="task-technician.html" class="active" title="My Tasks"><i class="fa-solid fa-clipboard-list"></i><span>My Tasks</span></a></li>
                    <li><a href="#" title="History"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a></li>
                </ul>
                <div class="sidebar-footer">
                    <div class="user-profile">
                        <div class="user-avatar"><span>T</span></div>
                        <div class="user-info">
                            <div class="user-name">User Name</div>
                            <div class="user-role">Technician</div>
                        </div>
                    </div>
                </div>
            </aside>

            <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>
            <header class="topbar">
                <button type="button" class="topbar-menu-btn" id="topbarMenuBtn" aria-label="Open menu"><i class="fa-solid fa-bars"></i></button>
                <div class="search-container">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" placeholder="Search">
                    </div>
                </div>
                <div class="topbar-right">
                    <div class="notification-container">
                        <div class="notification-icon">
                            <i class="fa-regular fa-bell"></i>
                            <span class="notification-badge"></span>
                        </div>
                        <div class="notification-dropdown" id="notificationDropdown">
                            <div class="notification-item"><i class="fa-solid fa-book-open-reader"></i> New report submitted</div>
                            <div class="notification-item"><i class="fa-solid fa-user"></i> New user registration</div>
                            <div class="notification-item"><i class="fa-solid fa-sync-alt"></i> System update available</div>
                        </div>
                    </div>
                    <div style="position: relative;">
                        <div class="admin-profile">
                            <div class="admin-avatar"><span>T</span></div>
                            <div class="admin-info">
                                <div class="admin-name">Juan Dela Cruz</div>
                                <div class="admin-role">Technician</div>
                            </div>
                            <i class="fa-solid fa-chevron-down" style="font-size: 10px; color: #6b7280;"></i>
                        </div>
                        <div class="profile-dropdown" id="profileDropdown">
                            <div class="profile-menu-item">👤 My Profile</div>
                            <div class="profile-menu-item">⚙️ Settings</div>
                            <div class="profile-menu-item">🔐 Change Password</div>
                            <div class="profile-menu-item">🚪 Logout</div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="content">
                <header class="tasks-page-header">
                    <h1>My Tasks</h1>
                    <p>Manage and track your assigned maintenance tasks</p>
                </header>

                <div class="task-filters" role="tablist">
                    <button type="button" class="task-filter-btn active" data-filter="all" aria-pressed="true">
                        All Tasks <span class="task-filter-count" data-for="all">(0)</span>
                    </button>
                    <button type="button" class="task-filter-btn" data-filter="pending" aria-pressed="false">
                        <i class="fa-regular fa-clock"></i> Pending <span class="task-filter-count" data-for="pending">(0)</span>
                    </button>
                    <button type="button" class="task-filter-btn" data-filter="in-progress" aria-pressed="false">
                        <i class="fa-solid fa-play"></i> In Progress <span class="task-filter-count" data-for="in-progress">(0)</span>
                    </button>
                    <button type="button" class="task-filter-btn" data-filter="completed" aria-pressed="false">
                        <i class="fa-solid fa-check"></i> Completed <span class="task-filter-count" data-for="completed">(0)</span>
                    </button>
                </div>

                <div class="task-list" id="taskList"></div>
            </main>
        </div>

        <script type="module" src="js/dashboard-technician.js"></script>
        <script type="module" src="js/task-technician.js"></script>
        <script type="module">
            import { loadUserProfile } from '../shared/js/userProfile.js';
            loadUserProfile();
        </script>
        <script type="module">
            import { initDropdown } from '../shared/js/dropdownActions.js';
            initDropdown({ handleToggle: false });
        </script>
    </body>
</html>
