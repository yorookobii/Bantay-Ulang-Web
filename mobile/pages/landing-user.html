<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
        <title>Bantay Ulang - Mobile</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            body {
                font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                min-height: 100vh;
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background-image: url('../../web/assets/img/3.png');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                position: relative;
                padding: 24px 20px;
            }
            body::before {
                content: '';
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.35);
                z-index: 0;
            }

            .landing-content {
                position: relative;
                z-index: 1;
                text-align: center;
                color: #fff;
                text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
                max-width: 100%;
                width: 100%;
            }

            .landing-content h1 {
                font-size: 1.75rem;
                font-weight: 700;
                margin-bottom: 0.5rem;
                line-height: 1.2;
            }
            .landing-content h4 {
                font-size: 1.15rem;
                font-weight: 600;
                margin-bottom: 1rem;
                line-height: 1.3;
                opacity: 0.95;
            }
            .landing-content p {
                font-size: 0.9375rem;
                line-height: 1.5;
                margin-bottom: 1.5rem;
                opacity: 0.95;
            }

            .landing-content .btn-get-started {
                display: inline-block;
                background-color: #fff;
                color: #111827;
                border: none;
                padding: 14px 28px;
                border-radius: 999px;
                cursor: pointer;
                font-weight: 600;
                font-size: 1rem;
                font-family: inherit;
                text-decoration: none;
                text-shadow: none;
                -webkit-tap-highlight-color: transparent;
                transition: background-color 0.2s, transform 0.1s;
            }
            .landing-content .btn-get-started:hover {
                background-color: #f0fdfa;
            }
            .landing-content .btn-get-started:active {
                transform: scale(0.98);
            }
        </style>
    </head>
    <body>
        <div class="landing-content">
            <h1>Bantay Ulang</h1>
            <h4>An Adaptive Ulang Focused Aquaponic System</h4>
            <a href="login.html" class="btn-get-started">Get Started</a>
        </div>
    </body>
</html>
